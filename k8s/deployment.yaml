apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostroute-backend
  labels:
    app: ghostroute
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ghostroute
      component: backend
  template:
    metadata:
      labels:
        app: ghostroute
        component: backend
    spec:
      containers:
      - name: backend
        image: ghostroute/backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ghostroute-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ghostroute-secrets
              key: redis-url
        - name: PORT
          value: "3001"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ghostroute-backend
spec:
  selector:
    app: ghostroute
    component: backend
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostroute-frontend
  labels:
    app: ghostroute
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ghostroute
      component: frontend
  template:
    metadata:
      labels:
        app: ghostroute
        component: frontend
    spec:
      containers:
      - name: frontend
        image: ghostroute/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://ghostroute-backend:3001/api"
        - name: NEXT_PUBLIC_WS_URL
          value: "ws://ghostroute-backend:3001/ws"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: ghostroute-frontend
spec:
  selector:
    app: ghostroute
    component: frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer
