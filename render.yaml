services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: ghostroute-backend
    env: node
    rootDir: backend
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: npx prisma db push && node dist/index.js
    healthCheckPath: /api/system/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: ghostroute-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ghostroute-redis
          property: connectionString
      - key: ETH_RPC
        sync: false
      - key: ARB_RPC
        sync: false
      - key: BASE_RPC
        sync: false
      - key: SOL_RPC
        sync: false
      - key: AVAX_RPC
        sync: false
      - key: BNB_RPC
        value: https://bsc-dataseed.binance.org
      - key: DEPLOYER_PRIVATE_KEY
        sync: false

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: ghostroute-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Server-side proxy target — wired automatically to backend internal URL
      - key: BACKEND_URL
        fromService:
          type: web
          name: ghostroute-backend
          envVarKey: RENDER_INTERNAL_URL
      # WebSocket — set manually after backend first deploys
      # Value: wss://ghostroute-backend.onrender.com/ws
      - key: NEXT_PUBLIC_WS_URL
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: ghostroute-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: ghostroute-db
    databaseName: ghostroute
    user: postgres
    plan: free
